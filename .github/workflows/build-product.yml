name: Build Product

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Typst
        uses: typst-community/setup-typst@v4
        with:
          typst-version: latest

      - name: Install dependencies
        run: pip install -r ai-product-factory/requirements.txt

      - name: Generate product files
        run: python ai-product-factory/src/generate_product.py

      - name: Copy output to repo folder
        run: |
          mkdir -p generated-output
          cp -r ai-product-factory/dist/* generated-output/
          find generated-output -type f | sort

      - name: Commit generated output
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update generated product output
          file_pattern: generated-output/**
