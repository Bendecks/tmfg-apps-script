name: Build Product
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r ai-product-factory/requirements.txt
      - run: python ai-product-factory/src/generate_product.py
      - uses: actions/upload-artifact@v4
        with:
          name: ai-job-search-kit
          path: ai-product-factory/dist/
