name: Deploy to Apps Script

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/deploy-apps-script.yml'
      - 'package.json'
      - '.claspignore'
      - '.clasp.json'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Restore clasp auth
        run: |
          mkdir -p $HOME
          echo '${{ secrets.CLASPRC_JSON }}' > $HOME/.clasprc.json

      - name: Show repo .clasp.json
        run: |
          echo "=== .clasp.json from repo ==="
          cat ./.clasp.json

      - name: Push to Apps Script
        run: npx clasp push -f

      - name: Verify deploy target and file state
        run: |
          echo "=== clasp status ==="
          npx clasp status --json || npx clasp status

      - name: Fail fast if Code.gs is missing locally
        run: |
          test -f src/Code.gs