name: Deploy to Apps Script

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/deploy-apps-script.yml'
      - 'package.json'
      - '.claspignore'
      - '.clasp.json'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Restore clasp auth
        run: |
          mkdir -p $HOME
          echo '${{ secrets.CLASPRC_JSON }}' > $HOME/.clasprc.json

      - name: Show repo .clasp.json
        run: |
          echo "=== .clasp.json from repo ==="
          cat ./.clasp.json

      - name: Show local files
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== repo tree ==="
          find . -maxdepth 3 -type f | sort
          echo "=== src/Code.gs head ==="
          head -n 20 src/Code.gs || true

      - name: Push and verify Apps Script content
        run: |
          echo "=== PUSH ==="
          npx clasp push -f

          echo "=== STATUS AFTER PUSH ==="
          npx clasp status --json || npx clasp status

          echo "=== LOCAL CODE PREVIEW ==="
          head -n 20 src/Code.gs || true

          echo "=== PULL REMOTE INTO FRESH FOLDER ==="
          rm -rf verify_pull
          mkdir verify_pull
          cp .clasp.json verify_pull/.clasp.json
          cd verify_pull
          npx clasp pull

          echo "=== PULLED FILES ==="
          find . -maxdepth 3 -type f | sort

          echo "=== PULLED CODE.JS PREVIEW ==="
          head -n 40 src/Code.js || true

          echo "=== PULLED CODE.GS PREVIEW ==="
          head -n 40 src/Code.gs || true