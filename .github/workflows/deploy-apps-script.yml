name: Deploy to Apps Script

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/deploy-apps-script.yml'
      - 'package.json'
      - '.claspignore'
      - '.clasp.json'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Restore clasp auth
        run: |
          mkdir -p $HOME
          echo '${{ secrets.CLASPRC_JSON }}' > $HOME/.clasprc.json

      - name: Show repo .clasp.json
        run: |
          echo "=== .clasp.json from repo ==="
          cat ./.clasp.json

      - name: Show local files
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== repo tree ==="
          find . -maxdepth 3 -type f | sort
          echo "=== src/Code.gs head ==="
          head -n 20 src/Code.gs || true

      - name: Push to Apps Script
        run: npx clasp push -f

      - name: Verify clasp status
        run: |
          echo "=== clasp status ==="
          npx clasp status --json || npx clasp status
      - name: Compare local and pulled files
        run: |
          echo "=== local Code.gs preview ==="
          head -n 20 src/Code.gs || true
          echo "=== pulled Code.js preview ==="
          head -n 20 verify_pull/src/Code.js || true
    

      - name: Fail fast if Code.gs is missing locally
        run: |
          test -f src/Code.gs