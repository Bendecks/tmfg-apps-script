name: Pinterest Factory
on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * *'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate Pinterest queue
        run: node pinterest-factory/generate-pins.js
      - name: Commit generated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pinterest-factory/output || true
          git diff --staged --quiet || git commit -m "Run Pinterest Factory"
          git push
