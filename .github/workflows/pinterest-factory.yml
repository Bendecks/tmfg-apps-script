name: Pinterest Factory

# Automatic/scheduled trigger disabled to prevent GitHub Actions usage.
# Run manually from the Actions tab only.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate Pinterest queue
        run: node pinterest-factory/generate-pins.js
        env:
          IMAGE_MODE: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_IMAGE_LIMIT: '3'
      - name: Commit generated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pinterest-factory/output || true
          git diff --staged --quiet || git commit -m "Run Pinterest Factory"
          git push
